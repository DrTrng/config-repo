spring.datasource.url=jdbc:postgresql://localhost:5434/order_db
spring.datasource.username=dev
spring.datasource.password=dev
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
server.port=8081

spring.flyway.enabled=true
spring.flyway.locations=classpath:com/example/order/db/migration

internal.http.connect-timeout=3s
internal.http.read-timeout=5s
logging.level.org.flywaydb=DEBUG

# Kafka Binder
spring.cloud.stream.kafka.binder.brokers=localhost:9092
spring.cloud.stream.default.contentType=application/json

# Output binding
spring.cloud.stream.bindings.orderCreated-out-0.destination=order-created
spring.cloud.stream.bindings.orderCreated-out-0.contentType=application/json

# Producer: tắt type header đi, để payment tự map theo config của nó
spring.cloud.stream.kafka.bindings.orderCreated-out-0.producer.configuration.value.serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.cloud.stream.kafka.bindings.orderCreated-out-0.producer.configuration.spring.json.add.type.headers=false