spring.datasource.url=jdbc:postgresql://localhost:5434/order_db
spring.datasource.username=dev
spring.datasource.password=dev

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

server.port=8081

spring.flyway.enabled=true
spring.flyway.locations=classpath:com/example/order/db/migration


# internal HttpClient configuration
internal.http.connect-timeout=3s
internal.http.read-timeout=5s
logging.level.org.flywaydb=DEBUG

# Kafka configuration
kafka.topic.order-created=order-created
spring.kafka.consumer.group-id=order-group