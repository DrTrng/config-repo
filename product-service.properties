spring.datasource.url=jdbc:postgresql://localhost:5434/product_db
spring.datasource.username=dev
spring.datasource.password=dev

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

server.port=8083

spring.flyway.enabled=true
spring.flyway.locations=classpath:com/example/product/db/migration


# internal HttpClient configuration
internal.http.connect-timeout=3s
internal.http.read-timeout=5s

logging.level.org.flywaydb=DEBUG

# Common Kafka configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true