spring.datasource.url=jdbc:postgresql://localhost:5434/payment_db
spring.datasource.username=dev
spring.datasource.password=dev

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8082

spring.flyway.enabled=true
spring.flyway.locations=classpath:com/example/payment/db/migration

# ✅ KAFKA CLOUD STREAM - FIX 3 VẤN ĐỀ
spring.cloud.stream.kafka.binder.brokers=localhost:9092

# Consumer binding - QUAN TRỌNG!
spring.cloud.stream.bindings.orderCreated-in-0.destination=order-created
spring.cloud.stream.bindings.orderCreated-in-0.group=payment-service-group
spring.cloud.stream.bindings.orderCreated-in-0.contentType=application/*+json  # ✅ JSON!

# ✅ FIX OFFSET + DESERIALIZER
spring.cloud.stream.bindings.orderCreated-in-0.consumer.auto-offset-reset=earliest  # Đọc từ đầu!
spring.cloud.stream.bindings.orderCreated-in-0.consumer.start-offset=earliest
spring.cloud.stream.bindings.orderCreated-in-0.consumer.concurrency=3

# JSON Deserializer config
spring.cloud.stream.bindings.orderCreated-in-0.consumer.configuration.spring.json.trusted.packages=com.example.*
spring.cloud.stream.bindings.orderCreated-in-0.consumer.configuration.spring.json.value.default.type=com.example.order.event.dto.order.OrderCreatedEventRequest

