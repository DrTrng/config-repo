spring.datasource.url=jdbc:postgresql://localhost:5434/payment_db
spring.datasource.username=dev
spring.datasource.password=dev
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8082

spring.flyway.enabled=true
spring.flyway.locations=classpath:com/example/payment/db/migration

# Kafka Binder
spring.cloud.stream.kafka.binder.brokers=localhost:9092
spring.cloud.stream.default.contentType=application/json

# Function definition
spring.cloud.function.definition=orderCreated

# Input binding
spring.cloud.stream.bindings.orderCreated-in-0.destination=order-created
spring.cloud.stream.bindings.orderCreated-in-0.group=payment-service-group
spring.cloud.stream.bindings.orderCreated-in-0.contentType=application/json
spring.cloud.stream.bindings.orderCreated-in-0.consumer.concurrency=3

# ✅ Đặt auto-offset-reset đúng chỗ — ở tầng binder, không phải configuration.*
spring.cloud.stream.kafka.bindings.orderCreated-in-0.consumer.auto-offset-reset=earliest

# ✅ Deserializer đặt ở tầng binder
spring.cloud.stream.kafka.binder.consumer-properties.value.deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.cloud.stream.kafka.binder.consumer-properties.spring.json.trusted.packages=com.example.*
spring.cloud.stream.kafka.binder.consumer-properties.spring.json.use.type.headers=false
spring.cloud.stream.kafka.binder.consumer-properties.spring.json.value.default.type=com.example.payment.event.dto.OrderCreatedEventRequest

# Timeout
spring.cloud.stream.kafka.binder.consumer-properties.default.api.timeout.ms=30000
spring.cloud.stream.kafka.binder.consumer-properties.request.timeout.ms=20000

logging.level.org.springframework.cloud.stream=DEBUG
logging.level.org.springframework.integration=DEBUG